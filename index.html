<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>اختبار التاريخ</title>

<style>
body{
    margin:0;
    padding:0;
    background:#111;
    color:white;
    font-family:Tahoma,Arial,sans-serif;
    direction:rtl;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.box{
    background:#1e1e1e;
    border-radius:14px;
    padding:25px;
}

h1{

}

#progress{

}

#question{

}

.option{

}

.correct{

}

</style>
</head>

<body>

        <div id="answers"></div>
    </div>

    <!-- jump to question -->
    <div style="text-align:center;margin-top:15px;">

        style="padding:10px;width:130px;border:none;border-radius:8px;font-size:16px;">

    </div>

</div>

{question:"80- نموذج التسامح الديني بين الحضارات هو الملك ؟",options:["سنحاريب","تاركوينوس","الإسكندر الأكبر","نبوخذ نصر الثاني"],answer:2}

];


let current = 0;
let score = 0;

const progress = document.getElementById("progress");
const question = document.getElementById("question");
const answers = document.getElementById("answers");
const quizBox = document.getElementById("quizBox");

function loadQuestion(){

let q = quizData[current];

progress.innerHTML = `السؤال ${current+1} من ${quizData.length}`;
question.innerHTML = q.question;
answers.innerHTML = "";

q.options.forEach((opt,index)=>{

let btn = document.createElement("button");
btn.className = "option";
btn.innerHTML = opt;

btn.onclick = () => selectAnswer(btn,index);

answers.appendChild(btn);

});

}

function selectAnswer(btn,index){

let correct = quizData[current].answer;
let buttons = document.querySelectorAll(".option");

buttons.forEach(b => b.disabled = true);

let delay = 2000;

if(index === correct){
    btn.classList.add("correct");
    score++;
    delay = 1000;
}else{
    btn.classList.add("wrong");
    buttons[correct].classList.add("correct");
    delay = 2000;
}

setTimeout(()=>{

current++;

if(current < quizData.length){
    loadQuestion();
}else{
    showResult();
}

}, delay);

}

function showResult(){

let percent = Math.round((score / quizData.length) * 100);

quizBox.innerHTML = `
<div id="result">
<h2>انتهى الاختبار</h2>
<p>درجتك: ${score} / ${quizData.length}</p>
<p>${percent}%</p>
<button onclick="location.reload()"
style="padding:12px 20px;border:none;border-radius:10px;background:#008cff;color:white;font-size:18px;cursor:pointer;">
إعادة اللعب
</button>
</div>
`;

}

document.getElementById("jumpBtn").onclick = function(){

let num = parseInt(document.getElementById("jumpInput").value);

if(!isNaN(num) && num >= 1 && num <= quizData.length){
    current = num - 1;
    loadQuestion();
}

};

loadQuestion();

</script>
