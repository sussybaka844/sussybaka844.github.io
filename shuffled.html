<!DOCTYPE html>
<html lang="jp">
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>اختبار التاريخ</title>

<style>
body{
    margin:0;
    padding:0;
    background:#111;
    color:white;
    font-family:Tahoma,Arial,sans-serif;
    direction:rtl;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.box{
    background:#1e1e1e;
    border-radius:14px;
    padding:25px;
}

h1{
    text-align:center;
    margin-top:0;
}

#progress{
    color:#aaa;
    margin-bottom:15px;
    font-size:18px;
}

#question{
    font-size:26px;
    margin-bottom:20px;
    line-height:1.6;
}

.option{
    display:block;
    width:100%;
    margin:10px 0;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.option:hover{
    background:#444;
}

.correct{
    background:green !important;
}

.wrong{
    background:#a80000 !important;
}

#result{
    text-align:center;
    font-size:28px;
}
</style>
</head>

<body>

<div class="container">

    <div class="box" id="quizBox">
        <h1>اختبار التاريخ</h1>

        <div id="progress"></div>
        <div id="question"></div>
        <div id="answers"></div>
    </div>

    <!-- jump to question -->
    <div style="text-align:center;margin-top:15px;">

        <input id="jumpInput"
        type="number"
        min="1"
        placeholder="رقم السؤال"
        style="padding:10px;width:130px;border:none;border-radius:8px;font-size:16px;">

        <button id="jumpBtn"
        style="padding:10px 18px;border:none;border-radius:8px;background:#ff9800;color:white;cursor:pointer;font-size:16px;">
        اذهب
        </button>

    </div>

</div>

<script>

/* PASTE YOUR quizData ARRAY HERE */
const quizData = [ /* SAME AS YOUR CURRENT DATA */ ];

/* ---------------- SHUFFLE FUNCTION ---------------- */
function shuffleArray(array){
    for(let i = array.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

/* ---------------- SHUFFLE QUESTIONS ---------------- */
let shuffledQuiz = JSON.parse(JSON.stringify(quizData));
shuffleArray(shuffledQuiz);

/* ---------------- SHUFFLE OPTIONS (AND FIX ANSWERS) ---------------- */
shuffledQuiz.forEach(q => {
    let correctText = q.options[q.answer];

    let optionsWithIndex = q.options.map((opt, i) => ({
        text: opt,
        isCorrect: i === q.answer
    }));

    shuffleArray(optionsWithIndex);

    q.options = optionsWithIndex.map(o => o.text);
    q.answer = optionsWithIndex.findIndex(o => o.isCorrect);
});


let current = 0;
let score = 0;

const progress = document.getElementById("progress");
const question = document.getElementById("question");
const answers = document.getElementById("answers");
const quizBox = document.getElementById("quizBox");

function loadQuestion(){

let q = shuffledQuiz[current];

progress.innerHTML = `السؤال ${current+1} من ${shuffledQuiz.length}`;
question.innerHTML = q.question;
answers.innerHTML = "";

q.options.forEach((opt,index)=>{

let btn = document.createElement("button");
btn.className = "option";
btn.innerHTML = opt;

btn.onclick = () => selectAnswer(btn,index);

answers.appendChild(btn);

});

}

function selectAnswer(btn,index){

let correct = shuffledQuiz[current].answer;
let buttons = document.querySelectorAll(".option");

buttons.forEach(b => b.disabled = true);

let delay = 2000;

if(index === correct){
    btn.classList.add("correct");
    score++;
    delay = 500;
}else{
    btn.classList.add("wrong");
    buttons[correct].classList.add("correct");
    delay = 2000;
}

setTimeout(()=>{

current++;

if(current < shuffledQuiz.length){
    loadQuestion();
}else{
    showResult();
}

}, delay);

}

function showResult(){

let percent = Math.round((score / shuffledQuiz.length) * 100);

quizBox.innerHTML = `
<div id="result">
<h2>انتهى الاختبار</h2>
<p>درجتك: ${score} / ${shuffledQuiz.length}</p>
<p>${percent}%</p>
<button onclick="location.reload()"
style="padding:12px 20px;border:none;border-radius:10px;background:#008cff;color:white;font-size:18px;cursor:pointer;">
إعادة اللعب
</button>
</div>
`;

}

document.getElementById("jumpBtn").onclick = function(){

let num = parseInt(document.getElementById("jumpInput").value);

if(!isNaN(num) && num >= 1 && num <= shuffledQuiz.length){
    current = num - 1;
    loadQuestion();
}

};

loadQuestion();

</script>

</body>
</html>
</body>
</html>
